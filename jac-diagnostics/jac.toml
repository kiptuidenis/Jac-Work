[project]
name = "jac-diagnostics"
version = "0.1.0"
description = "Comprehensive Jaseci Ecosystem Diagnostic App"
entry-point = "main.jac"

[dependencies.npm]
jac-client-node = "1.0.7"
react-hook-form = ">=7.45.0"
"@hookform/resolvers" = "latest"
zod = "latest"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.byllm.model]
default_model = "gemini/gemini-2.5-flash"
api_key = "AIzaSyDoqRbK9kAs4eXByX27VfOKsf8I0liywCs"
base_url = ""
proxy = false
verbose = false

[plugins.byllm.call_params]
temperature = 0.7
max_tokens = 0

[plugins.byllm.litellm]
local_cost_map = true
drop_params = true
